server:
  port: ${SERVER_PORT_USER}

spring:
  application:
    name: user-service
  datasource:
    url: ${USER_DB_URL}
    username: ${DB_USERNAME_2}
    password: ${DB_PASSWORD_2}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

grpc:
  server:
    port: 9090


application:
  security:
    jwt:
      secret-key: a-random-string-that-i-think-is-secret
      expiration: 86400000